name: investsmart-backend
region: fra

services:
  - name: backend
    type: web
    github:
      branch: main
      repository: devleandroid/app_financeiro
    build:
      buildpack: python
    build_command: pip install -r requirements.txt
    run_command: uvicorn src.presentation.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
    env:
      - name: ENVIRONMENT
        value: production
      - name: DEBUG
        value: "false"
      - name: FIXER_API_KEY
        secret: fixer_api_key
      - name: ADMIN_USER
        value: admin
      - name: ADMIN_PASS
        secret: admin_pass
      - name: EMAIL_REMETENTE
        secret: email_remetente
      - name: EMAIL_SENHA
        secret: email_senha
